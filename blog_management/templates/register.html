{% load static%}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Register</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/register.css' %}" />
  </head>
  <body>
    <div class="container-fluid register-container">
      <div class="row justify-content-center align-items-center register-row" style="width: 40%;">
        <div class="col-12" >
          <div class="card shadow register-card m-1 " >
            <div class="card-body ">
              <h3 class="text-center mb-4">User Registration</h3>

              <!-- Alert Box -->
              <div id="alertBox"></div>

              <form id="registerForm" enctype="multipart/form-data">
                <!-- Email -->
                <div class="mb-3">
                  <label class="form-label"> Email </label>

                  <input
                    type="email"
                    class="form-control"
                    id="email"
                    required
                  />
                </div>
                <!-- Username -->
                <div class="mb-3">
                  <label class="form-label"> Username </label>

                  <input
                    type="text"
                    class="form-control"
                    id="username"
                    required
                  />
                </div>
                <!-- First Name -->
                <div class="mb-3">
                  <label class="form-label"> First Name </label>

                  <input
                    type="text"
                    class="form-control"
                    id="first_name"
                    required
                  />
                </div>

                <!-- Last Name -->
                <div class="mb-3">
                  <label class="form-label"> Last Name </label>

                  <input
                    type="text"
                    class="form-control"
                    id="last_name"
                    required
                  />
                </div>

                <!-- Profile Picture -->
                <div class="mb-3">
                  <label class="form-label"> Profile Picture </label>

                  <input
                    type="file"
                    class="form-control"
                    id="profile_picture"
                    accept="image/*"
                  />
                </div>

                <!-- Password -->
                <div class="mb-3">
                  <label class="form-label"> Password </label>

                  <input
                    type="password"
                    class="form-control"
                    id="password"
                    required
                  />
                </div>

                <!-- Confirm Password -->
                <div class="mb-3">
                  <label class="form-label"> Confirm Password </label>

                  <input
                    type="password"
                    class="form-control"
                    id="confirm_password"
                    required
                  />
                </div>

                <!-- Register Button -->
                <div class="d-grid">
                  <button type="submit" class="btn btn-primary register-btn">
                    Register
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="{% static 'js/register.js' %}"></script>
  </body>
</html>
