{% extends "user_home.html" %}
{% load static %}

{% block title %}
Edit Blog
{% endblock %}

{% block style %}
<link rel="stylesheet" href="{% static '/css/edit_blog.css' %}">
{% endblock %}

{% block content %}

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-md-10">

            <div class="card shadow">
                <div class="card-body">

                    <h3 class="card-title mb-4 text-center">
                        Edit Blog
                    </h3>

                    <!-- Alert Box -->
                    <div id="alertBox"></div>

                    <form id="editBlogForm" enctype="multipart/form-data">

                        <input type="hidden" id="blogId" value="{{ id }}">

                        <!-- Blog Title -->
                        <div class="mb-3">
                            <label class="form-label">Blog Title</label>
                            <input type="text"
                                   class="form-control"
                                   id="blogTitle"
                                   required>
                        </div>

                        <!-- Blog Thumbnail -->
                        <div class="mb-3">

                            <label class="form-label">
                                Blog Thumbnail
                            </label>

                            <img id="thumbnailPreview"
                                 class="img-fluid mb-2 preview-image">

                            <input type="file"
                                   class="form-control"
                                   id="blogThumbnail"
                                   accept="image/*">
                        </div>

                        <!-- Blog Content -->
                        <div class="mb-3">
                            <label class="form-label">
                                Blog Content
                            </label>

                            <textarea class="form-control"
                                      id="blogContent"
                                      rows="6"
                                      required></textarea>
                        </div>

                        <!-- Save Button -->
                        <div class="d-grid">
                            <button type="submit"
                                    class="btn btn-success">

                                Save Changes

                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

{% endblock %}


{% block script %}
<script src="{% static '/js/edit_blog.js' %}"></script>
{% endblock %}
